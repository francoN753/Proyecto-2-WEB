<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deezer-Manager — Plataforma avanzada de gestión musical. Inicia sesión para descubrir artistas, gestionar tu colección y más.">
    <title>Deezer-Manager | Iniciar Sesión</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="manifest" href="./manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body class="login-layout">

    <!-- Floating Theme Toggle for Login Page -->
    <button id="theme-toggle" class="theme-toggle-floating" aria-label="Alternar tema">🌙 Modo Oscuro</button>

    <section class="login-card">
        <!-- Logo & Title -->
        <div class="login-logo">
            <div class="login-logo-icon">🎛️</div>
            <h1>Deezer Manager</h1>
            <p class="subtitle">Suite profesional para la gestión de contenidos musicales.</p>
        </div>

        <!-- Login Form -->
        <form id="login-form">
            <div class="form-group">
                <label for="username">Email Profesional</label>
                <div class="input-wrapper">
                    <span class="input-icon">@</span>
                    <input type="text" id="username" name="username" placeholder="nombre@empresa.com" required autocomplete="username">
                </div>
            </div>

            <div class="form-group">
                <div class="form-label-row">
                    <label for="password">Contraseña</label>
                    <span class="form-link">¿Olvidaste tu contraseña?</span>
                </div>
                <div class="input-wrapper">
                    <span class="input-icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="btn-eye" id="toggle-password" aria-label="Mostrar contraseña">👁️</button>
                </div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="remember-me">
                <label for="remember-me" style="text-transform:none; letter-spacing:0; font-weight:400;">Mantener sesión iniciada</label>
            </div>

            <button type="submit" id="submit-btn" class="btn-primary">
                <span id="btn-text">Iniciar Sesión →</span>
                <div id="login-spinner" class="spinner"></div>
            </button>
        </form>

        <!-- Footer -->
        <div class="login-footer">
            <p>¿No tienes una cuenta corporativa?</p>
            <a>Contacta con Soporte Técnico</a>
        </div>

        <div class="login-langs">
            <span>Español</span>
            <span>English</span>
            <span>Français</span>
        </div>
    </section>

    <div id="toast-container"></div>

    <script src="./js/auth.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('toggle-password').addEventListener('click', function() {
            const pwd = document.getElementById('password');
            pwd.type = pwd.type === 'password' ? 'text' : 'password';
            this.textContent = pwd.type === 'password' ? '👁️' : '🙈';
        });

        // Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(r => console.log('SW registered:', r.scope))
                    .catch(e => console.error('SW failed:', e));
            });
        }
    </script>
</body>
</html>
