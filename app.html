<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Deezer-Manager — Plataforma Avanzada de Gestión Musical.">
    <title>Deezer-Manager | App</title>
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/layout.css">
    <link rel="stylesheet" href="./css/components.css">
    <link rel="manifest" href="./manifest.json">
    <style>
        /* Specific App Styles */
        .search-bar {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .nav-menu {
            margin-top: 2rem;
            flex: 1;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.75rem 1rem;
            color: var(--text-secondary);
            border-radius: var(--radius-md);
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: all var(--t-fast);
        }
        .nav-item:hover, .nav-item.active {
            background: var(--bg-input);
            color: var(--primary-color);
            font-weight: 600;
        }
        .nav-item svg {
            width: 20px;
            height: 20px;
        }
        .logout-btn {
            color: #ef4444; /* red */
            margin-top: auto;
        }
        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        /* Views */
        .view-container {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .view-container.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .offline-banner {
            background: #f59e0b;
            color: white;
            text-align: center;
            padding: 0.5rem;
            font-weight: 600;
            display: none; /* hidden by default */
            z-index: 100;
        }
        
        /* Loading Overlay */
        #global-loading {
            position: fixed;
            inset: 0;
            background: var(--bg-body);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            flex-direction: column;
            gap: 1rem;
        }
        
        #global-loading .spinner {
            display: block;
            width: 3rem;
            height: 3rem;
            border-top-color: var(--primary-color);
        }
    </style>
</head>
<body class="app-layout">

    <!-- Loading Overlay -->
    <div id="global-loading">
        <div class="spinner"></div>
        <p>Cargando Deezer-Manager...</p>
    </div>

    <!-- Offline Banner -->
    <div id="offline-banner" class="offline-banner">
        ⚠️ Sin conexión de red. Estás usando la versión local (Modo Offline).
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand" style="display: flex; align-items: center; gap: 0.5rem; font-weight: 700; font-size: 1.25rem;">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#brandGrad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <defs>
                    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="var(--primary-color)"/>
                        <stop offset="100%" stop-color="var(--secondary-color)"/>
                    </linearGradient>
                </defs>
                <path d="M9 18V5l12-2v13"></path>
                <circle cx="6" cy="18" r="3"></circle>
                <circle cx="18" cy="16" r="3"></circle>
            </svg>
            Deezer-Manager
        </div>

        <nav class="nav-menu">
            <div class="nav-item active" data-view="search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                Buscar Artista
            </div>
            <div class="nav-item" data-view="albums">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                Mis Álbumes
            </div>
        </nav>

        <div class="nav-item logout-btn" id="logout-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Cerrar Sesión
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Topbar -->
        <header class="topbar">
            <!-- Mobile Menu Toggle (Simplified) -->
            <button class="btn-icon" style="display:none;" id="mobile-menu-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>

            <!-- Search Bar (Only visible on search view) -->
            <form id="search-form" class="search-bar input-wrapper">
                <svg class="input-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Busca un artista en Deezer..." autocomplete="off">
            </form>

            <div style="display: flex; align-items: center; gap: 1rem;">
                <div id="user-display" style="font-weight: 600; color: var(--text-primary);"></div>
                <button id="theme-toggle" class="btn-icon" aria-label="Cambiar tema">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="moon-icon"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                </button>
            </div>
        </header>

        <!-- Views Area -->
        <section class="content-area">
            <!-- Search View -->
            <div id="view-search" class="view-container active">
                <div id="search-results">
                    <!-- Initial Empty State -->
                    <div class="empty-state">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        <h2>Busca tu música favorita</h2>
                        <p>Utiliza la barra superior para buscar cualquier artista.</p>
                    </div>
                </div>
            </div>

            <!-- Artist Detail View -->
            <div id="view-artist" class="view-container">
                <button class="btn-icon" id="back-to-search" style="margin-bottom: 1rem;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Volver
                </button>
                <div id="artist-details-content">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- My Albums View -->
            <div id="view-albums" class="view-container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem;">
                    <h2>Mis Álbumes Favoritos</h2>
                    
                    <!-- Rating Filter -->
                    <div style="display:flex; align-items:center; gap:0.5rem;">
                        <label for="rating-filter" style="font-size:0.875rem; color:var(--text-secondary);">Filtrar por:</label>
                        <select id="rating-filter" style="padding:0.5rem; border-radius:var(--radius-sm); border:1px solid var(--border-color); background:var(--bg-input); color:var(--text-primary);">
                            <option value="0">Todas las estrellas</option>
                            <option value="5">5 Estrellas</option>
                            <option value="4">4 Estrellas</option>
                            <option value="3">3 Estrellas</option>
                            <option value="2">2 Estrellas</option>
                            <option value="1">1 Estrella</option>
                        </select>
                    </div>
                </div>
                <div id="my-albums-list">
                    <!-- Populated by JS -->
                </div>
            </div>
        </section>
    </main>

    <!-- Global Audio Player (Hidden visually, managed by JS) -->
    <audio id="global-player" style="display:none;"></audio>

    <script src="./js/storage.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/app.js"></script>
</body>
</html>
